apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-app
  template:
    metadata:
      labels:
        app: dev-app
    spec:
      containers:
      - name: webserver
        image: dev-webserver:latest # Assuming this image exists or is built
        ports:
        - containerPort: 80
        - containerPort: 8080
        - containerPort: 22
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://db-service:3306/KEO_SIENGHENG-db
        - name: SPRING_DATASOURCE_USERNAME
          value: root
        - name: SPRING_DATASOURCE_PASSWORD
          value: Hello@123
      - name: db
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_DATABASE
          value: KEO_SIENGHENG-db
        - name: MYSQL_ROOT_PASSWORD
          value: Hello@123
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: db-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: dev-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: http
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: web
    - protocol: TCP
      port: 22
      targetPort: 22
      name: ssh
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector:
    app: dev-app
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP
