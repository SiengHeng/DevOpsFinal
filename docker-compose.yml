services:
  webserver:
    build: ./webserver
    ports:
      - "80:80"
      - "8080:8080"
      - "2222:22"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/KEO_SIENGHENG-db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Hello@123

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=KEO_SIENGHENG-db
      - MYSQL_ROOT_PASSWORD=Hello@123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
